scene:
  type: single_joint
  inertia: 0.05
  damping: 0.1
  gravity: false
  q0: 0.0
  dq0: 0.0

test:
  type: frequency_response
  amplitude: 0.05
  frequencies: [0.5, 1.0, 2.0, 4.0, 8.0]
  cycles_per_frequency: 8
  settle_cycles: 3
  offset: 0.0

simulation:
  # duration is derived automatically from frequencies and cycles_per_frequency
  dt: 0.002

logging:
  save_csv: true

plots:
  position: true
  velocity: true
  torque: true
  error: true
  phase: true
  frequency_response: true

output:
  save_video: false
