fit:
  parameters:
    scene.joint.inertia:        {min: 0.01,    max: 2.0}
    scene.joint.damping:        {min: 0.0,     max: 10.0}
    controller.kp:              {min: 1.0,     max: 300.0}
    controller.kd:              {min: 0.0,     max: 20.0}
    actuator.torque_limit:      {min: 10.0,    max: 500.0}
    # log-spaced so the ideal-actuator limit (tau -> 0, rate -> infinity) is reachable
    actuator.time_constant:     {min: 1.0e-5,  max: 1.0,    log: true}
    actuator.torque_rate_limit: {min: 5.0,     max: 1.0e+5, log: true}
  objective:
    q_weight:      1.0
    dq_weight:     0.2
    tau_weight:    0.0
    metric_weight: 0.5
  samples: 6000
  seed: 42
