scene:
  type: single_joint
  inertia: 0.05
  damping: 0.1
  gravity: false
  q0: 0.7127   # measured steady-state angle at h_des=0.35 m
  dq0: 0.0

test:
  type: step
  target: 1.1055  # q_des = arccos((0.616-0.45)/0.37), the commanded angle for h_des=0.45 m
  start_time: 0.0

simulation:
  duration: 2.5   # one full 2.5-s step cycle, matching real data window
  dt: 0.002       # matches real data sample rate (500 Hz)

logging:
  save_csv: true

plots:
  position: true
  velocity: true
  torque: true
  error: true
  phase: true
  frequency_response: false

output:
  save_video: false
